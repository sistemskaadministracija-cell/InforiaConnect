name: Build InforiaConnect Windows
run-name: ${{ format('InforiaConnect Windows [{0}] - {1}', inputs.build_profile || 'baseline', inputs.build_name || github.event.head_commit.message) }}

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      build_name:
        description: "Descriptive name shown in the GitHub Actions tab"
        required: true
        type: string
      build_profile:
        description: "Baseline is the reliable release path; accelerated adds FFmpeg hardware codecs and VRAM"
        required: true
        default: baseline
        type: choice
        options:
          - baseline
          - accelerated

env:
  FLUTTER_VERSION: "3.24.5"
  RUST_VERSION: "stable"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  LLVM_VERSION: "15.0.6"
  CARGO_NET_RETRY: 10
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  generate-bridge:
    runs-on: windows-2022
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          

      - name: Install flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Run bridge generator
        shell: bash
        run: |
          pip3 install pygments
          cargo install flutter_rust_bridge_codegen --version "1.80.1" --features "uuid"
          pushd flutter && flutter pub get && popd
          ~/.cargo/bin/flutter_rust_bridge_codegen \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart \
            --c-output ./flutter/macos/Runner/bridge_generated.h \
            --extra-c-output-path ./flutter/windows/runner/ \
            --extra-c-output-path ./flutter/linux/
          pushd flutter
          flutter pub run build_runner build --delete-conflicting-outputs
          popd
            
      - name: Upload bridge artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bridge-artifact
          path: |
            ./src/bridge_generated.rs
            ./src/bridge_generated.io.rs
            ./flutter/lib/generated_bridge.dart
            ./flutter/lib/generated_bridge.freezed.dart
            ./flutter/macos/Runner/bridge_generated.h
            ./flutter/windows/runner/bridge_generated.h
            ./flutter/linux/bridge_generated.h

  build-windows:
    needs: [generate-bridge]
    runs-on: windows-2022
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Replace engine with rustdesk custom flutter engine
        run: |
          flutter doctor -v
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          mv -Force windows-x64-release/* C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: "rustfmt"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-2022-${{ inputs.build_profile || 'baseline' }}

      - name: Setup vcpkg
        shell: bash
        run: |
          rm -rf C:/vcpkg
          git clone https://github.com/microsoft/vcpkg.git C:/vcpkg
          cd C:/vcpkg
          git checkout ${{ env.VCPKG_COMMIT_ID }}
          ./bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=C:/vcpkg" >> $GITHUB_ENV

      - name: Install baseline software codec dependencies
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_profile == 'baseline' }}
        shell: pwsh
        run: |
          C:\vcpkg\vcpkg.exe install `
            aom:x64-windows-static `
            libjpeg-turbo:x64-windows-static `
            libvpx:x64-windows-static `
            libyuv:x64-windows-static `
            opus:x64-windows-static `
            --classic `
            --x-install-root="${{ github.workspace }}\vcpkg_installed"

      - name: Install accelerated codec dependencies
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_profile == 'accelerated' }}
        run: |
          C:\vcpkg\vcpkg.exe install --triplet x64-windows-static

      - name: Fix FFmpeg Header Paths for MSVC
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_profile == 'accelerated' }}
        shell: pwsh
        run: |
          $rootInc = "${{ github.workspace }}/vcpkg_installed/x64-windows-static/include"
          $required = @("libavcodec", "libavutil", "libavformat", "libswscale")
          
          Write-Host "Locating FFmpeg headers in manifest workspace: $rootInc"
          foreach ($folder in $required) {
              $targetPath = Join-Path $rootInc $folder
              
              if (!(Test-Path $targetPath)) {
                  $found = Get-ChildItem -Path $rootInc -Directory -Recurse -Filter $folder -ErrorAction SilentlyContinue | Select-Object -First 1
                  
                  if ($found) {
                      Write-Host "Found $folder at $($found.FullName). Moving to root..."
                      Move-Item -Path $found.FullName -Destination $rootInc -Force
                  } else {
                      Write-Error "CRITICAL: $folder could not be found anywhere in $rootInc! vcpkg installation failed."
                  }
              } else {
                  Write-Host "$folder is already in the correct root path."
              }
          }
              
      - name: Build baseline InforiaConnect installer
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_profile == 'baseline' }}
        shell: bash
        env:
          VCPKG_ROOT: 'C:\vcpkg'
          VCPKG_INSTALLED_ROOT: '${{ github.workspace }}/vcpkg_installed'
        run: |
          python3 build.py --portable --flutter 2>&1

      - name: Build accelerated InforiaConnect installer
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_profile == 'accelerated' }}
        shell: bash
        env:
          VCPKG_ROOT: 'C:\vpkg'
          FFMPEG_DIR: '${{ github.workspace }}/vpkg_installed/x64-windows-static'
          RUSTFLAGS: >-
            -L native=${{ github.workspace }}/vpkg_installed/x64-windows-static/lib 
            -C link-arg=/LIBPATH:${{ github.workspace }}/vpkg_installed/x64-windows-static/lib 
            -C link-arg=swresample.lib 
            -C link-arg=strmiids.lib 
            -C link-arg=mfplat.lib 
            -C link-arg=mfuuid.lib
            -C link-arg=/FORCE:MULTIPLE
          BINDGEN_EXTRA_CLANG_ARGS: "-I${{ github.workspace }}/vpkg_installed/x64-windows-static/include"
        run: |
          # 1. Clean out any corrupted or pre-existing folders/links safely
          powershell -Command "if (Test-Path 'C:\vpkg\installed') { Remove-Item -Recurse -Force 'C:\vpkg\installed' }"
          
          # 2. Re-create the parent directory structure
          powershell -Command "New-Item -ItemType Directory -Force -Path 'C:\vpkg\installed'"
          
          # 3. Ensure the workspace target folder exists, then link it
          powershell -Command "if (!(Test-Path '${{ github.workspace }}\vpkg_installed\x64-windows-static')) { New-Item -ItemType Directory -Force -Path '${{ github.workspace }}\vpkg_installed\x64-windows-static' }"
          powershell -Command "New-Item -ItemType Junction -Path 'C:\vpkg\installed\x64-windows-static' -Value '${{ github.workspace }}\vpkg_installed\x64-windows-static'"
          
          # 4. Build the optional hardware-accelerated variant
          python3 build.py --portable --hwcodec --flutter --vram 2>&1

      - name: Prepare Installer Artifact
        shell: bash
        run: |
          mkdir -p ./Output
          mv ./InforiaConnect-*-install.exe ./Output/InforiaConnect-Windows-Setup.exe
          
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: InforiaConnect-Windows-${{ inputs.build_profile || 'baseline' }}-Setup
          path: ./Output/InforiaConnect-Windows-Setup.exe
