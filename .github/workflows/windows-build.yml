name: Build InforiaConnect Windows

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.24.5"
  RUST_VERSION: "1.75"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  LLVM_VERSION: "15.0.6"
  CARGO_NET_RETRY: 10
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  generate-bridge:
    runs-on: windows-2022
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Run bridge generator
        shell: bash
        run: |
          pip3 install pygments
          cargo install flutter_rust_bridge_codegen --version "1.80.1" --features "uuid"
          pushd flutter && flutter pub get && popd
          ~/.cargo/bin/flutter_rust_bridge_codegen \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart \
            --c-output ./flutter/macos/Runner/bridge_generated.h \
            --extra-c-output-path ./flutter/windows/runner/ \
            --extra-c-output-path ./flutter/linux/
          pushd flutter
          flutter pub run build_runner build --delete-conflicting-outputs
          popd
            
      - name: Upload bridge artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bridge-artifact
          path: |
            ./src/bridge_generated.rs
            ./src/bridge_generated.io.rs
            ./flutter/lib/generated_bridge.dart
            ./flutter/lib/generated_bridge.freezed.dart
            ./flutter/macos/Runner/bridge_generated.h
            ./flutter/windows/runner/bridge_generated.h
            ./flutter/linux/bridge_generated.h

  build-windows:
    needs: [generate-bridge]
    runs-on: windows-2022
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Replace engine with rustdesk custom flutter engine
        run: |
          flutter doctor -v
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          mv -Force windows-x64-release/* C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: "rustfmt"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-2022

      - name: Setup vcpkg
        shell: bash
        run: |
          rm -rf C:/vcpkg
          git clone https://github.com/microsoft/vcpkg.git C:/vcpkg
          cd C:/vcpkg
          git checkout ${{ env.VCPKG_COMMIT_ID }}
          ./bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=C:/vcpkg" >> $GITHUB_ENV

      - name: Flatten FFmpeg Header Include Paths
        shell: pwsh
        run: |
          $ffmpegInc = "C:/vcpkg/installed/x64-windows-static/include/ffmpeg"
          $rootInc = "C:/vcpkg/installed/x64-windows-static/include"
          
          if (Test-Path $ffmpegInc) {
              Write-Host "FFmpeg include directory found. Elevating header directories..."
              
              # Copy directories recursively if they exist
              if (Test-Path "$ffmpegInc/libavutil") { Copy-Item -Path "$ffmpegInc/libavutil" -Destination $rootInc -Recurse -Force }
              if (Test-Path "$ffmpegInc/libavcodec") { Copy-Item -Path "$ffmpegInc/libavcodec" -Destination $rootInc -Recurse -Force }
              if (Test-Path "$ffmpegInc/libavformat") { Copy-Item -Path "$ffmpegInc/libavformat" -Destination $rootInc -Recurse -Force }
              if (Test-Path "$ffmpegInc/libswscale") { Copy-Item -Path "$ffmpegInc/libswscale" -Destination $rootInc -Recurse -Force }
              
              Write-Host "Header files successfully reorganized for MSVC."
          } else {
              Write-Warning "FFmpeg directory path not found at $ffmpegInc"
          } 

      - name: Build InforiaConnect Portable Installer
        shell: bash
        env:
          VCPKG_ROOT: 'C:\vcpkg'
          FFMPEG_DIR: 'C:\vcpkg\installed\x64-windows-static'
          CPATH: 'C:\vcpkg\installed\x64-windows-static\include'
          INCLUDE: 'C:\vcpkg\installed\x64-windows-static\include'
          LIB: 'C:\vcpkg\installed\x64-windows-static\lib'
        run: |
          python3 build.py --portable --hwcodec --flutter --vram 2>&1
          echo "Exit code: $?"

      - name: Prepare Installer Artifact
        shell: bash
        run: |
          # Create the output directory
          mkdir -p ./Output
          
          # Find the final compiled installer file (handles whatever version number is generated)
          # and copy it directly to your static target name inside the Output folder
          mv ./InforiaConnect-*-install.exe ./Output/InforiaConnect-Windows-Setup.exe
          
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: InforiaConnect-Windows-Setup
          path: ./Output/InforiaConnect-Windows-Setup.exe